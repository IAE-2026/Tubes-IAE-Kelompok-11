version: '3.8'

services:
  app:
    build: .
    container_name: guest-service
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: guest_service_db
      DB_USERNAME: root
      DB_PASSWORD:
      IAE_API_KEY: 102022400289
      SERVICE_NAME: Guest-Service
      API_VERSION: v1
      CENTRAL_SSO_JWKS_URL: https://iae-sso.virtualfri.id/api/v1/auth/jwks
      CENTRAL_SOAP_AUDIT_URL: https://iae-sso.virtualfri.id/soap/v1/audit
      CENTRAL_RABBITMQ_BRIDGE_URL: https://iae-sso.virtualfri.id/api/v1/messages/publish
      CENTRAL_API_KEY: KEY-MHS-346
      CENTRAL_TEAM_ID: TEAM-11
      CENTRAL_SSO_TOKEN_URL: https://iae-sso.virtualfri.id/api/v1/auth/token
      STUDENT_NIM: 102022400289
      INTERNAL_SERVICE_KEY: internal-tim-11-iae

  db:
    image: mysql:8.0
    container_name: guest-service-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: guest_service_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - guest-db-data:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: guest-service-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  guest-db-data: