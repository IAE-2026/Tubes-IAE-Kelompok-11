"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Ambil satu guest berdasarkan ID."
    guest(id: ID! @eq): Guest @find

    "Ambil semua guest."
    guests: [Guest!]! @all
}

"Data tamu hotel."
type Guest {
    "Primary key UUID."
    id: ID!

    "Nama lengkap tamu."
    name: String!

    "Email unik tamu."
    email: String!

    "Nomor KTP tamu."
    ktp_number: String!

    "Nomor telepon tamu."
    phone_number: String

    "Waktu data dibuat."
    created_at: DateTime!
}