events {
    worker_connections 1024;
}

http {
    # Nonaktifkan header versi Nginx (keamanan)
    server_tokens off;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;

        # -------------------------------------------------------
        # SECURITY: Blokir akses ke endpoint internal dari luar.
        # Path /internal/ tidak pernah dirutekan ke service manapun.
        # -------------------------------------------------------
        location ~ ^/api/(catalog|guest|reservasi)/internal/ {
            return 403 '{"error":"Forbidden: internal endpoint tidak dapat diakses"}';
            add_header Content-Type application/json;
        }

        # -------------------------------------------------------
        # ROUTING: Catalog Service
        # Semua request ke /api/catalog/ diteruskan ke catalog-service:8000
        # -------------------------------------------------------
        location /api/catalog/ {
            proxy_pass         ; #isi namaContainer:port
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # -------------------------------------------------------
        # ROUTING: Guest Service
        # Semua request ke /api/guest/ diteruskan ke guest-service:8000
        # -------------------------------------------------------
        location /api/guest/ {
            proxy_pass         http://guest-service:8001/api/; #isi namaContainer:port
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # -------------------------------------------------------
        # ROUTING: Reservasi Service
        # Semua request ke /api/reservasi/ diteruskan ke reservasi-service:7070
        # -------------------------------------------------------
        location /api/reservasi/ {
            proxy_pass         http://reservasi-service:8003/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # -------------------------------------------------------
        # Health check endpoint untuk Gateway itu sendiri
        # -------------------------------------------------------
        location /health {
            return 200 '{"status":"API Gateway OK"}';
            add_header Content-Type application/json;
        }

        # Default: tolak semua request yang tidak dikenali
        location / {
            return 404 '{"error":"Route tidak ditemukan"}';
            add_header Content-Type application/json;
        }
    }
}
